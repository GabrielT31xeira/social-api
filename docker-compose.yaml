services:

  # Container for Nginx
  nginx:
    build:
      context: ./nginx/docker
      dockerfile: Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    ports:
      - "84:80"
    volumes:
      - "./:/var/www/html"
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on:
      - app
      - db
    networks:
      - test_net

  # Container for Laravel
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    volumes:
      - "./:/var/www/html"
    environment:
      - "DB_CONNECTION=mysql"
      - "DB_HOST=db"
      - "DB_PORT=3306"
      - "DB_DATABASE=testdb"
      - "DB_USERNAME=testroot"
      - "DB_PASSWORD=secret!132"
    command: bash /var/www/html/php/start.sh
    depends_on:
      - db
    networks:
      - test_net

  # Container for MariaDB
  db:
    image: mariadb:latest
    restart: always
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: testdb
      MYSQL_USER: testroot
      MYSQL_PASSWORD: secret!132
    command:
      [
        '--default-authentication-plugin=mysql_native_password',
        '--init-file=/docker-entrypoint-initdb.d/init.sql'
      ]
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - test_net

networks:
  test_net:
